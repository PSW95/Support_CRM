[build]
builder = "python"
pythonVersion = "3.11"

[build.packages]
pkgs = ["python311", "python311-pip", "python311-virtualenv"]

[phases.setup]
nixPkgs = ["python311", "python311-pip", "python311-virtualenv"]

[phases.install]
cmds = [
  "python -m venv /opt/venv",
  "source /opt/venv/bin/activate",
  "/opt/venv/bin/pip install --upgrade pip",
  "/opt/venv/bin/pip install -r requirements.txt"
]

[phases.start]
cmd = "cd Backend && /opt/venv/bin/uvicorn app.main:app --host 0.0.0.0 --port $PORT"
