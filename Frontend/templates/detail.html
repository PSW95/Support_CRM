{% extends "base.html" %}

{% block title %}Ticket Detail - Support CRM{% endblock %}

{% block content %}
<div id="ticketDetail" class="bg-white rounded-lg shadow-lg p-6 max-w-3xl mx-auto">
    <div class="text-center py-8 text-gray-500">Loading ticket...</div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const ticketId = window.location.pathname.split('/').pop();
    loadTicketDetail(ticketId);
});

function loadTicketDetail(ticketId) {
    fetch(`/api/tickets/${ticketId}`)
        .then(response => {
            if (!response.ok) {
                throw new Error('Ticket not found');
            }
            return response.json();
        })
        .then(ticket => {
            renderTicket(ticket);
        })
        .catch(error => {
            document.getElementById('ticketDetail').innerHTML = `
                <div class="text-center py-12">
                    <p class="text-red-500 text-lg">❌ Ticket not found</p>
                    <a href="/" class="inline-block mt-4 text-blue-600 hover:underline">← Back to Dashboard</a>
                </div>
            `;
            console.error('Error:', error);
        });
}

function renderTicket(ticket) {
    const container = document.getElementById('ticketDetail');
    
    container.innerHTML = `
        <div class="flex justify-between items-start mb-6">
            <div>
                <h1 class="text-2xl font-bold text-gray-800">${ticket.subject}</h1>
                <span class="text-sm font-mono text-gray-500">${ticket.ticket_id}</span>
            </div>
            <a href="/" class="text-blue-600 hover:underline">← Back</a>
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
            <div>
                <label class="block text-sm font-medium text-gray-600">Customer</label>
                <p class="text-gray-800">${ticket.customer_name}</p>
                <p class="text-gray-600">${ticket.customer_email}</p>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-600">Status</label>
                <span class="inline-block px-3 py-1 rounded-full text-sm ${getStatusColor(ticket.status)}">
                    ${ticket.status}
                </span>
            </div>
        </div>
        
        <div class="mb-6">
            <label class="block text-sm font-medium text-gray-600 mb-1">Description</label>
            <p class="text-gray-800 bg-gray-50 p-4 rounded-lg">${ticket.description}</p>
        </div>
        
        <div class="mb-6">
            <label class="block text-sm font-medium text-gray-600 mb-2">Update Status</label>
            <div class="flex gap-3">
                <select id="statusSelect" class="flex-1 border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="Open" ${ticket.status === 'Open' ? 'selected' : ''}>Open</option>
                    <option value="In Progress" ${ticket.status === 'In Progress' ? 'selected' : ''}>In Progress</option>
                    <option value="Closed" ${ticket.status === 'Closed' ? 'selected' : ''}>Closed</option>
                </select>
                <button onclick="updateStatus('${ticket.ticket_id}')" 
                    class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition">
                    Update
                </button>
            </div>
        </div>
        
        <div class="mb-6">
            <label class="block text-sm font-medium text-gray-600 mb-2">Add Note</label>
            <div class="flex gap-3">
                <textarea id="noteInput" rows="2" placeholder="Add a note..." 
                    class="flex-1 border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
                <button onclick="addNote('${ticket.ticket_id}')" 
                    class="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700 transition self-start">
                    Add Note
                </button>
            </div>
        </div>
        
        <div>
            <label class="block text-sm font-medium text-gray-600 mb-2">Notes & Activity</label>
            ${ticket.notes && ticket.notes.length > 0 ? 
                ticket.notes.map(note => `
                    <div class="bg-gray-50 p-3 rounded-lg mb-2">
                        <p class="text-gray-800">${note.note_text}</p>
                        <span class="text-xs text-gray-500">${new Date(note.created_at).toLocaleString()}</span>
                    </div>
                `).join('') : 
                '<p class="text-gray-500 text-sm">No notes yet</p>'
            }
        </div>
    `;
}

function getStatusColor(status) {
    const colors = {
        'Open': 'bg-green-100 text-green-800',
        'In Progress': 'bg-yellow-100 text-yellow-800',
        'Closed': 'bg-gray-100 text-gray-800'
    };
    return colors[status] || 'bg-gray-100 text-gray-800';
}

function updateStatus(ticketId) {
    const status = document.getElementById('statusSelect').value;
    
    fetch(`/api/tickets/${ticketId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status: status })
    })
    .then(response => response.json())
    .then(() => {
        loadTicketDetail(ticketId);
    })
    .catch(error => {
        console.error('Error updating status:', error);
        alert('Error updating status. Please try again.');
    });
}

function addNote(ticketId) {
    const note = document.getElementById('noteInput').value.trim();
    if (!note) {
        alert('Please enter a note.');
        return;
    }
    
    fetch(`/api/tickets/${ticketId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ notes: note })
    })
    .then(response => response.json())
    .then(() => {
        document.getElementById('noteInput').value = '';
        loadTicketDetail(ticketId);
    })
    .catch(error => {
        console.error('Error adding note:', error);
        alert('Error adding note. Please try again.');
    });
}
</script>
{% endblock %}
