{% extends "base.html" %}

{% block title %}Dashboard - Support CRM{% endblock %}

{% block content %}
<div class="bg-white rounded-lg shadow-lg p-6">
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6">
        <h1 class="text-2xl font-bold text-gray-800">Support Tickets</h1>
        <div class="flex flex-col md:flex-row gap-3 mt-3 md:mt-0 w-full md:w-auto">
            <input 
                type="text" 
                id="searchInput" 
                placeholder="Search tickets..." 
                class="border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 flex-1"
            >
            <select id="statusFilter" class="border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                <option value="All">All Status</option>
                <option value="Open">Open</option>
                <option value="In Progress">In Progress</option>
                <option value="Closed">Closed</option>
            </select>
        </div>
    </div>

    <div id="ticketsList" class="space-y-4">
        <!-- Tickets will be loaded here -->
        <div class="text-center py-8 text-gray-500">Loading tickets...</div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    loadTickets();

    const searchInput = document.getElementById('searchInput');
    const statusFilter = document.getElementById('statusFilter');

    let searchTimeout;
    searchInput.addEventListener('input', function() {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(loadTickets, 300);
    });

    statusFilter.addEventListener('change', loadTickets);
});

function loadTickets() {
    const search = document.getElementById('searchInput').value;
    const status = document.getElementById('statusFilter').value;
    
    let url = '/api/tickets?';
    if (search) url += `search=${encodeURIComponent(search)}&`;
    if (status !== 'All') url += `status=${encodeURIComponent(status)}`;

    fetch(url)
        .then(response => response.json())
        .then(tickets => {
            const container = document.getElementById('ticketsList');
            if (tickets.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-12">
                        <p class="text-gray-500 text-lg">No tickets found</p>
                        <a href="/create" class="inline-block mt-4 bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700">
                            Create New Ticket
                        </a>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = tickets.map(ticket => `
                <div class="border rounded-lg p-4 hover:shadow-md transition cursor-pointer" onclick="window.location='/ticket/${ticket.ticket_id}'">
                    <div class="flex flex-col md:flex-row justify-between items-start md:items-center">
                        <div class="flex-1">
                            <div class="flex items-center gap-3">
                                <span class="text-sm font-mono text-gray-500">${ticket.ticket_id}</span>
                                <span class="px-2 py-1 text-xs rounded-full ${getStatusColor(ticket.status)}">
                                    ${ticket.status}
                                </span>
                            </div>
                            <h3 class="font-semibold text-gray-800 mt-1">${ticket.subject}</h3>
                            <p class="text-sm text-gray-600">${ticket.customer_name}</p>
                        </div>
                        <div class="text-sm text-gray-500 mt-2 md:mt-0">
                            ${new Date(ticket.created_at).toLocaleDateString()}
                        </div>
                    </div>
                </div>
            `).join('');
        })
        .catch(error => {
            console.error('Error loading tickets:', error);
            document.getElementById('ticketsList').innerHTML = `
                <div class="text-center py-8 text-red-500">Error loading tickets. Please try again.</div>
            `;
        });
}

function getStatusColor(status) {
    const colors = {
        'Open': 'bg-green-100 text-green-800',
        'In Progress': 'bg-yellow-100 text-yellow-800',
        'Closed': 'bg-gray-100 text-gray-800'
    };
    return colors[status] || 'bg-gray-100 text-gray-800';
}
</script>
{% endblock %}
